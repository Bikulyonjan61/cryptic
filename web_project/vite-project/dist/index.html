<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cryptic</title>
    <script type="module" crossorigin src="/assets/main-ClrTwz95.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/chat-Bx48hdJF.js">
    <link rel="stylesheet" crossorigin href="/assets/main-LY0-liR-.css">
  </head>
<body class="min-h-screen bg-[url('/src/assets/bg.png')] bg-cover flex flex-col items-center">
  <header class="w-full text-center py-8">
    <h1 class="text-8xl font-extrabold text-purple-600 drop-shadow-lg mt-10">
      Cryptic
    </h1>
  </header>
  <div class="relative w-full max-w-sm bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col justify-center mt-18">
    <div class="flex border-b border-gray-200">
      <button id="tab-create" class="flex-1 py-3 text-gray-900 font-medium relative transition-colors duration-150 border-b-2 border-blue-500">
        Create Room
      </button>
      <button id="tab-join" class="flex-1 py-3 text-gray-400 font-medium relative transition-colors duration-150">
        Join Room
      </button>
    </div>
    <div class="p-6">
      <div id="panel-create">
        <label class="block text-sm font-medium text-gray-500 mb-2">Enter code</label>
        <input id="create-name" type="text" placeholder="xxxx" 
               class="w-full px-3 py-2 mb-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <button id="btn-create" class="w-full py-2 bg-purple-400 text-white rounded-lg hover:bg-purple-500 transition">
          Create Room
        </button>
      </div>
      <div id="panel-join" class="hidden">
        <label class="block text-sm font-medium text-gray-500 mb-2">Room Code</label>
        <input id="join-code" type="text" placeholder="XXXX" 
               class="w-full px-3 py-2 mb-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <button id="btn-join" class="w-full py-2 bg-purple-400 text-white rounded-lg hover:bg-purple-500 transition">
          Join Room
        </button>
      </div>
    </div>
  </div>

</body>
</html>
